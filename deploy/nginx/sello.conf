# Install this file on the VPS as:
# /etc/nginx/sites-available/sello.conf
# Then symlink it:
# sudo ln -s /etc/nginx/sites-available/sello.conf /etc/nginx/sites-enabled/sello.conf

server {
    listen 80;
    listen [::]:80;
    server_name sello.webportfolio.uz selloapi.webportfolio.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sello.webportfolio.uz;

    ssl_certificate /etc/letsencrypt/live/sello.webportfolio.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sello.webportfolio.uz/privkey.pem;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name selloapi.webportfolio.uz;

    ssl_certificate /etc/letsencrypt/live/selloapi.webportfolio.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/selloapi.webportfolio.uz/privkey.pem;

    client_max_body_size 10m;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location /auth/meta/callback {
        proxy_pass http://127.0.0.1:8000/api/v1/integrations/instagram/oauth/callback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /webhooks/instagram {
        proxy_pass http://127.0.0.1:8000/api/v1/webhooks/instagram;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
