services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      API_ENV: production
      API_CORS_ORIGINS: https://sello.webportfolio.uz
      API_DATABASE_URL: ${API_DATABASE_URL}
      API_REDIS_URL: ${API_REDIS_URL}
      META_OAUTH_CALLBACK_URL: https://selloapi.webportfolio.uz/auth/meta/callback
      INSTAGRAM_WEBHOOK_URL: https://selloapi.webportfolio.uz/webhooks/instagram
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://selloapi.webportfolio.uz
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      NEXT_PUBLIC_API_URL: https://selloapi.webportfolio.uz
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
